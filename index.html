<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>あついよ〜！わんこレスキュー</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="startScreen" class="start-screen">
    <div class="start-card">
      <h1>あついよ〜！わんこレスキュー</h1>
      <p>アイテムをドラッグして、わんこをすずしくしてあげよう。</p>
      <input id="playerName" type="text" placeholder="ユーザー名" maxlength="20" />
      <button id="startBtn" type="button" onclick="window.startApp && window.startApp()">スタート</button>
    </div>
  </div>

  <div class="app">
    <header class="topbar">
      <div class="title">あついよ〜！わんこレスキュー</div>
      <div class="player">プレイヤー：<span id="playerLabel">ななし</span></div>
    </header>

    <main class="main">
      <aside class="sidebar left">
        <div class="panel thermobox">
          <div class="panel-title">おへやの おんど</div>
          <div class="temp"><span id="tempValue">32</span>℃</div>
        </div>
        <div class="panel energybox">
          <div class="panel-title">わんこの げんき</div>
          <div class="bar"><div id="energyBar"></div></div>
          <div id="energyText" class="smalltext">とてもあつそう！</div>
        </div>
        <div class="panel scorebox">
          <div class="panel-title">スコア</div>
          <div class="score"><span id="scoreValue">0</span> 点</div>
          <button id="saveScoreBtn" class="mini-btn">きろく</button>
          <button id="showRankBtn" class="mini-btn">ランキング</button>
        </div>
      </aside>

      <section class="play-wrap">
        <div id="playArea" class="play-area">
          <img class="room-bg" src="assets/backgrounds/room_main.png" alt="へや" />
          <div id="roomOverlays" class="room-overlays"></div>
          <img id="dogImage" class="dog-image" src="assets/dogs/base/dog_hot.png" alt="わんこ" />
          <div id="speech" class="speech">あついよ〜</div>
          <div id="trashBin" class="trash-bin">🗑️ ここにおくと けせる</div>
        </div>
      </section>

      <aside class="sidebar right">
        <div class="panel tips">
          <div class="panel-title">つかいかた</div>
          <ul>
            <li>アイテムをドラッグしよう</li>
            <li>わんこにわたすと、まんなかのわんこが入れかわる</li>
            <li>へやの道具は、へやにおいてつかえる</li>
            <li>おいた道具は、ゴミばこへドラッグでけせる</li>
          </ul>
        </div>
        <div class="panel dogbtns">
          <div class="panel-title">わんこ</div>
          <button id="resetDogBtn" class="mini-btn wide">わんこを もどす</button>
          <button id="resetAllBtn" class="mini-btn wide">ぜんぶ もどす</button>
        </div>
      </aside>
    </main>

    <section class="drawer">
      <div class="drawer-title">アイテム</div>
      <div id="itemGrid" class="item-grid"></div>
    </section>
  </div>

  <div id="choiceModal" class="modal hidden">
    <div class="modal-card">
      <h2 id="choiceTitle">どうつかう？</h2>
      <p id="choiceText">つかいかたをえらぼう</p>
      <div id="choiceList" class="choice-list"></div>
      <button id="cancelChoiceBtn" class="mini-btn wide">キャンセル</button>
    </div>
  </div>

  <div id="rankingModal" class="modal hidden">
    <div class="modal-card">
      <h2>きょうのランキング</h2>
      <ol id="rankList"></ol>
      <button id="closeRankBtn" class="mini-btn wide">とじる</button>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script src="app.js"></script>
</body>
</html>
