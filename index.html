<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>あついよ〜！わんこレスキュー</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="nameScreen" class="name-screen">
    <div class="name-card">
      <img src="assets/dogs/dog_happy.png" alt="元気なわんこ" class="start-dog" />
      <h1>あついよ〜！<br>わんこレスキュー</h1>
      <p>なまえを入れて、今日のクールダウン対決をはじめよう！</p>
      <input id="playerName" maxlength="12" placeholder="なまえ" autocomplete="off" />
      <button id="startBtn" class="primary">スタート</button>
    </div>
  </div>

  <main class="game-shell" aria-label="あついよ〜！わんこレスキュー">
    <header class="topbar">
      <button class="round-btn" id="homeBtn">⌂<span>ホーム</span></button>
      <div class="title-wrap">
        <h1><span class="hot">あついよ〜！</span> <span class="blue">わんこ</span><span class="orange">レスキュー</span></h1>
      </div>
      <div class="top-actions">
        <button class="round-btn" id="soundBtn">🔊<span>おと</span></button>
        <button class="round-btn help" id="helpBtn">？<span>ヘルプ</span></button>
      </div>
    </header>

    <section class="stage">
      <aside class="thermo-panel">
        <h2>きおん</h2>
        <div class="thermo-wrap">
          <div class="thermo"><div id="thermoFill" class="thermo-fill"></div></div>
          <div class="temp-number"><span id="tempValue">32</span><small>℃</small></div>
        </div>
        <div class="sun-warning">☀️<span id="tempHint">おへやが<br>とっても あついよ！</span></div>
      </aside>

      <div class="room" id="room">
        <img id="roomBg" class="room-bg" src="assets/backgrounds/room_hot.png" alt="暑い部屋" />
        <div id="speech" class="speech">あついよ〜</div>
        <img id="dogSprite" class="dog-sprite" src="assets/dogs/dog_hot.png" alt="暑そうなわんこ" />
      </div>

      <aside class="side-panel">
        <section class="meter-card">
          <h2>げんきメーター</h2>
          <div class="meter"><div id="energyFill" class="energy-fill"></div><span id="meterDog">🐶</span></div>
          <p id="energyText">とっても げんきが なくなっているよ！</p>
        </section>
        <section class="instruction-card">
          <div class="tab-title">⭐ アイテム</div>
          <p class="big-text">アイテムを<br>えらんで<br>わんこを<br>たすけよう！</p>
          <hr>
          <p class="hint">💡 つかいかたで<br>けっかが かわるよ</p>
        </section>
        <section class="score-card">
          <div>プレイヤー：<b id="playerLabel">-</b></div>
          <div>スコア：<b id="scoreValue">0</b></div>
          <button id="recordBtn">記録する</button>
          <button id="rankingBtn">ランキング</button>
        </section>
      </aside>
    </section>

    <section class="item-drawer open" id="itemDrawer">
      <div class="drawer-head">
        <button id="toggleItems" class="drawer-tab">アイテム ▲</button>
        <span>アイテムをえらんで、つかいかたを考えよう！（タップでOK）</span>
      </div>
      <div id="itemsGrid" class="items-grid"></div>
    </section>
  </main>

  <div id="choiceModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <h2 id="choiceTitle">どうつかう？</h2>
      <p id="choiceDesc">つかいかたをえらぼう。</p>
      <div id="choiceList" class="choice-list"></div>
      <button id="closeChoice" class="secondary">やめる</button>
    </div>
  </div>

  <div id="resultToast" class="result-toast hidden"></div>

  <div id="rankingModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-card ranking-card">
      <h2>今日のランキング</h2>
      <ol id="rankingList"></ol>
      <button id="closeRanking" class="primary">とじる</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
